<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Dessin</title>

<style>
body{
    margin:0;
    background:white;
    font-family:"Times New Roman", serif;
    overflow-y:auto;
    overflow-x:hidden;
}

#retour{
    position:fixed;
    top:20px;
    left:20px;
    color:blue;
    text-decoration:underline;
    font-size:18px;
    z-index:20;
}

.page{
    padding-top:90px;
    padding-bottom:120px;
}

.serie{
    width:100vw;
    margin-bottom:120px;
}

.titre-serie{
    text-align:center;
    font-size:22px;
    margin-bottom:25px;
    font-weight:normal;
}

.menu-horizontal{
    width:100vw;
    overflow-x:auto;
    overflow-y:hidden;
    white-space:nowrap;
    padding:25px 40px;
    box-sizing:border-box;
    border-top:1px solid black;
    border-bottom:1px solid black;
    background:white;
}

.miniature{
    height:260px;
    margin-right:35px;
    cursor:pointer;
    vertical-align:middle;
    border:1px solid black;
}

.miniature:hover{
    animation:tremble 0.12s infinite;
}

@keyframes tremble{
    0%{ transform:translate(0px, 0px) rotate(0deg); }
    25%{ transform:translate(2px, -1px) rotate(1deg); }
    50%{ transform:translate(-2px, 1px) rotate(-1deg); }
    75%{ transform:translate(1px, 2px) rotate(1deg); }
    100%{ transform:translate(-1px, -2px) rotate(0deg); }
}

#fenetre{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:rgba(255,255,255,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#fenetre img{
    max-width:90vw;
    max-height:90vh;
    object-fit:contain;
    border:1px solid black;
    background:white;
}
</style>
</head>

<body>

<a id="retour" href="index.html">retour</a>

<div class="page">

    <div class="serie">
        <h1 class="titre-serie">série 1</h1>

        <div class="menu-horizontal">
            <img class="miniature" src="dessin-01.webp" onclick="ouvrirImage('dessin-01.webp')">
            <img class="miniature" src="dessin-02.webp" onclick="ouvrirImage('dessin-02.webp')">
            <img class="miniature" src="dessin-03.webp" onclick="ouvrirImage('dessin-03.webp')">
            <img class="miniature" src="dessin-04.webp" onclick="ouvrirImage('dessin-04.webp')">
            <img class="miniature" src="dessin-05.webp" onclick="ouvrirImage('dessin-05.webp')">
            <img class="miniature" src="dessin-06.webp" onclick="ouvrirImage('dessin-06.webp')">
            <img class="miniature" src="dessin-07.webp" onclick="ouvrirImage('dessin-07.webp')">
        </div>
    </div>

</div>

<div id="fenetre" onclick="fermerImage()">
    <img id="image-ouverte" src="" alt="" onclick="event.stopPropagation()">
</div>

<script>
function ouvrirImage(image){
    document.getElementById("image-ouverte").src = image;
    document.getElementById("fenetre").style.display = "flex";
}

function fermerImage(){
    document.getElementById("fenetre").style.display = "none";
    document.getElementById("image-ouverte").src = "";
}
</script>

</body>
</html>
