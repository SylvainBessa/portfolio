<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Portfolio</title>

<style>
body{
    margin:0;
    background:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:"Times New Roman", serif;
}

#container{
    position:relative;
    width:1200px;
}

#etoile{
    width:100%;
    display:block;
}

.zone{
    position:absolute;
    cursor:pointer;
}

.texte-menu{
    position:absolute;
    display:none;
    font-size:38px;
    color:black;
    pointer-events:none;
    z-index:10;
    font-style:italic;
}

/* TEXTES */
#texte-portfolio{
    top:258px;
    left:216px;
}

#texte-cv{
    top:156px;
    left:576px;
}

#texte-volume{
    top:258px;
    right:216px;
}

#texte-zine{
    bottom:222px;
    left:300px;
}

#texte-dessin{
    bottom:222px;
    right:288px;
}

/* ZONES CLIQUABLES */
#portfolio{
    top:312px;
    left:288px;
    width:216px;
    height:192px;
}

#cv{
    top:144px;
    left:522px;
    width:156px;
    height:264px;
}

#volume{
    top:312px;
    right:288px;
    width:216px;
    height:192px;
}

#zine{
    bottom:276px;
    left:384px;
    width:192px;
    height:204px;
}

#dessin{
    bottom:276px;
    right:384px;
    width:192px;
    height:204px;
}
</style>
</head>

<body>

<div id="container">

<img id="etoile" src="etoile.jpg" alt="">

<div id="texte-portfolio" class="texte-menu">portfolio</div>
<div id="texte-cv" class="texte-menu">CV</div>
<div id="texte-volume" class="texte-menu">volume</div>
<div id="texte-zine" class="texte-menu">zine</div>
<div id="texte-dessin" class="texte-menu">dessin</div>

<div class="zone" id="portfolio"
onmouseover="afficherTexte('texte-portfolio')"
onmouseout="cacherTextes()"
onclick="location.href='portfolio.html'"></div>

<div class="zone" id="cv"
onmouseover="afficherTexte('texte-cv')"
onmouseout="cacherTextes()"
onclick="location.href='cv.html'"></div>

<div class="zone" id="volume"
onmouseover="afficherTexte('texte-volume')"
onmouseout="cacherTextes()"
onclick="location.href='volume.html'"></div>

<div class="zone" id="zine"
onmouseover="afficherTexte('texte-zine')"
onmouseout="cacherTextes()"
onclick="location.href='zine.html'"></div>

<div class="zone" id="dessin"
onmouseover="afficherTexte('texte-dessin')"
onmouseout="cacherTextes()"
onclick="location.href='dessin.html'"></div>

</div>

<script>
function afficherTexte(id){
    cacherTextes();
    document.getElementById(id).style.display = "block";
}

function cacherTextes(){
    const textes = document.querySelectorAll(".texte-menu");
    textes.forEach(function(texte){
        texte.style.display = "none";
    });
}
</script>

</body>
</html>
