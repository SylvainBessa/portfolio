<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Dessin</title>

<style>

body{
    margin:0;
    background:white;
    font-family:"Times New Roman", serif;
    overflow:hidden;
}

#retour{
    position:absolute;
    top:20px;
    left:20px;
    color:blue;
    text-decoration:underline;
    font-size:18px;
}

#image-grande{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%, -50%);
    max-width:75vw;
    max-height:68vh;
    object-fit:contain;
    display:none;
    z-index:5;
}

#menu-dessins{
    position:absolute;
    bottom:25px;
    left:0;
    width:100vw;
    overflow-x:auto;
    white-space:nowrap;
    padding:20px;
    box-sizing:border-box;
    border-top:1px solid black;
    background:white;
    z-index:10;
}

.miniature{
    height:110px;
    margin-right:20px;
    cursor:pointer;
    vertical-align:middle;
    border:1px solid black;
    transition:0.2s;
}

.miniature:hover{
    height:150px;
}

</style>
</head>

<body>

<a id="retour" href="index.html">retour</a>

<img id="image-grande" src="" alt="">

<div id="menu-dessins">

<img class="miniature" src="dessin-01.jpg" onclick="afficherDessin('dessin-01.jpg')">
<img class="miniature" src="dessin-02.jpg" onclick="afficherDessin('dessin-02.jpg')">
<img class="miniature" src="dessin-03.jpg" onclick="afficherDessin('dessin-03.jpg')">
<img class="miniature" src="dessin-04.jpg" onclick="afficherDessin('dessin-04.jpg')">
<img class="miniature" src="dessin-05.jpg" onclick="afficherDessin('dessin-05.jpg')">
<img class="miniature" src="dessin-06.jpg" onclick="afficherDessin('dessin-06.jpg')">
<img class="miniature" src="dessin-07.jpg" onclick="afficherDessin('dessin-07.jpg')">

</div>

<script>

function afficherDessin(image){
    const grandeImage = document.getElementById("image-grande");
    grandeImage.src = image;
    grandeImage.style.display = "block";
}

</script>

</body>
</html>
