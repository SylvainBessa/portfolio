<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Portfolio</title>

<style>
body{
    margin:0;
    background:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:"Times New Roman", serif;
}

#container{
    position:relative;
    width:1000px;
}

#etoile{
    width:100%;
    display:block;
}

.zone{
    position:absolute;
    cursor:pointer;
}

.texte-menu{
    position:absolute;
    display:none;
    font-size:32px;
    color:black;
    pointer-events:none;
    z-index:10;
    font-style:italic;
}

/* TEXTES */
#texte-portfolio{
    top:165px;
    left:105px;
}

#texte-cv{
    top:65px;
    left:480px;
}

#texte-volume{
    top:165px;
    right:110px;
}

#texte-zine{
    bottom:125px;
    left:180px;
}

#texte-dessin{
    bottom:125px;
    right:160px;
}

/* ZONES SUR LES BRANCHES */
#portfolio{
    top:260px;
    left:240px;
    width:180px;
    height:160px;
}

#cv{
    top:120px;
    left:435px;
    width:130px;
    height:220px;
}

#volume{
    top:260px;
    right:240px;
    width:180px;
    height:160px;
}

#zine{
    bottom:230px;
    left:320px;
    width:160px;
    height:170px;
}

#dessin{
    bottom:230px;
    right:320px;
    width:160px;
    height:170px;
}
</style>
</head>

<body>

<div id="container">

<img id="etoile" src="etoile.webp" alt="">

<div id="texte-portfolio" class="texte-menu">portfolio</div>
<div id="texte-cv" class="texte-menu">CV</div>
<div id="texte-volume" class="texte-menu">volume</div>
<div id="texte-zine" class="texte-menu">zine</div>
<div id="texte-dessin" class="texte-menu">dessin</div>

<div class="zone" id="portfolio"
onmouseover="afficherTexte('texte-portfolio')"
onmouseout="cacherTextes()"
onclick="location.href='portfolio.html'"></div>

<div class="zone" id="cv"
onmouseover="afficherTexte('texte-cv')"
onmouseout="cacherTextes()"
onclick="location.href='cv.html'"></div>

<div class="zone" id="volume"
onmouseover="afficherTexte('texte-volume')"
onmouseout="cacherTextes()"
onclick="location.href='volume.html'"></div>

<div class="zone" id="zine"
onmouseover="afficherTexte('texte-zine')"
onmouseout="cacherTextes()"
onclick="location.href='zine.html'"></div>

<div class="zone" id="dessin"
onmouseover="afficherTexte('texte-dessin')"
onmouseout="cacherTextes()"
onclick="location.href='dessin.html'"></div>

</div>

<script>
function afficherTexte(id){
    cacherTextes();
    document.getElementById(id).style.display = "block";
}

function cacherTextes(){
    const textes = document.querySelectorAll(".texte-menu");
    textes.forEach(function(texte){
        texte.style.display = "none";
    });
}
</script>

</body>
</html>
