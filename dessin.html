<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Dessin</title>

<style>
body{
    margin:0;
    background:white;
    font-family:"Times New Roman", serif;
    overflow-y:auto;
    overflow-x:hidden;
}

#retour{
    position:fixed;
    top:20px;
    left:20px;
    color:blue;
    text-decoration:underline;
    font-size:18px;
    z-index:20;
}

.page{
    padding-top:90px;
    padding-bottom:160px;
}

.serie{
    width:100vw;
    margin-bottom:160px;
}

.titre-serie{
    text-align:center;
    font-size:22px;
    margin-bottom:25px;
    font-weight:normal;
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
    line-height:1.3;
}

.menu-horizontal{
    width:100vw;
    overflow-x:auto;
    overflow-y:hidden;
    white-space:nowrap;
    padding:45px 60px;
    box-sizing:border-box;
    border-top:1px solid black;
    border-bottom:1px solid black;
    background:white;
}

.miniature{
    height:360px;
    margin-right:45px;
    cursor:pointer;
    vertical-align:middle;
    border:1px solid black;
}

.miniature:hover{
    opacity:0.75;
}

/* FENÊTRE POP-UP */

#popup{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:rgba(255,255,255,0.75);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#popup-contenu{
    position:relative;
    background:white;
    border:1px solid black;
    padding:20px;
    max-width:90vw;
    max-height:90vh;
    box-sizing:border-box;
}

#image-popup{
    display:block;
    max-width:85vw;
    max-height:82vh;
    object-fit:contain;
}

#fermer{
    position:absolute;
    top:5px;
    right:10px;
    font-size:22px;
    cursor:pointer;
    color:black;
}
</style>
</head>

<body>

<a id="retour" href="index.html">retour</a>

<div class="page">

    <div class="serie">
        <h1 class="titre-serie">séquence narrative de re-dessin par couches successives</h1>

        <div class="menu-horizontal">
            <img class="miniature" src="dessin-01.webp" onclick="ouvrirPopup(0)">
            <img class="miniature" src="dessin-02.webp" onclick="ouvrirPopup(1)">
            <img class="miniature" src="dessin-03.webp" onclick="ouvrirPopup(2)">
            <img class="miniature" src="dessin-04.webp" onclick="ouvrirPopup(3)">
            <img class="miniature" src="dessin-05.webp" onclick="ouvrirPopup(4)">
            <img class="miniature" src="dessin-06.webp" onclick="ouvrirPopup(5)">
            <img class="miniature" src="dessin-07.webp" onclick="ouvrirPopup(6)">
        </div>
    </div>

</div>

<div id="popup" onclick="fermerPopup()">
    <div id="popup-contenu" onclick="event.stopPropagation()">
        <div id="fermer" onclick="fermerPopup()">×</div>
        <img id="image-popup" src="" alt="">
    </div>
</div>

<script>
const dessins = [
    "dessin-01.webp",
    "dessin-02.webp",
    "dessin-03.webp",
    "dessin-04.webp",
    "dessin-05.webp",
    "dessin-06.webp",
    "dessin-07.webp"
];

let imageActuelle = 0;

function ouvrirPopup(index){
    imageActuelle = index;
    document.getElementById("image-popup").src = dessins[imageActuelle];
    document.getElementById("popup").style.display = "flex";
}

function fermerPopup(){
    document.getElementById("popup").style.display = "none";
    document.getElementById("image-popup").src = "";
}

function imageSuivante(){
    imageActuelle = imageActuelle + 1;

    if(imageActuelle >= dessins.length){
        imageActuelle = 0;
    }

    document.getElementById("image-popup").src = dessins[imageActuelle];
}

function imagePrecedente(){
    imageActuelle = imageActuelle - 1;

    if(imageActuelle < 0){
        imageActuelle = dessins.length - 1;
    }

    document.getElementById("image-popup").src = dessins[imageActuelle];
}

document.addEventListener("keydown", function(event){
    const popupOuvert = document.getElementById("popup").style.display === "flex";

    if(popupOuvert && event.key === "ArrowRight"){
        imageSuivante();
    }

    if(popupOuvert && event.key === "ArrowLeft"){
        imagePrecedente();
    }

    if(popupOuvert && event.key === "Escape"){
        fermerPopup();
    }
});
</script>

</body>
</html>
