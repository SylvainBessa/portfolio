<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Portfolio</title>

<style>

body{
    margin:0;
    background:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#container{
    position:relative;
    width:700px;
}

#etoile{
    width:100%;
    display:block;
}

/* Décommente la ligne border pour visualiser les zones */

/* PORTFOLIO */
#portfolio{
    position:absolute;
    top:80px;
    left:120px;
    width:170px;
    height:170px;
    /* border:1px solid red; */
}

/* CV */
#cv{
    position:absolute;
    top:0px;
    left:275px;
    width:150px;
    height:200px;
    /* border:1px solid red; */
}

/* VOLUME */
#volume{
    position:absolute;
    top:80px;
    right:120px;
    width:170px;
    height:170px;
    /* border:1px solid red; */
}

/* ZINE */
#zine{
    position:absolute;
    bottom:80px;
    right:120px;
    width:170px;
    height:170px;
    /* border:1px solid red; */
}

/* DESSIN */
#dessin{
    position:absolute;
    bottom:80px;
    left:120px;
    width:170px;
    height:170px;
    /* border:1px solid red; */
}

.zone{
    cursor:pointer;
}

</style>

</head>

<body>

<div id="container">

<img id="etoile" src="etoile.png">

<div class="zone" id="portfolio"
onmouseover="changeImage('etoile-portfolio.png')"
onmouseout="resetImage()"
onclick="location.href='portfolio.html'">
</div>

<div class="zone" id="cv"
onmouseover="changeImage('etoile-cv.png')"
onmouseout="resetImage()"
onclick="location.href='cv.html'">
</div>

<div class="zone" id="volume"
onmouseover="changeImage('etoile-volume.png')"
onmouseout="resetImage()"
onclick="location.href='volume.html'">
</div>

<div class="zone" id="zine"
onmouseover="changeImage('etoile-zine.png')"
onmouseout="resetImage()"
onclick="location.href='zine.html'">
</div>

<div class="zone" id="dessin"
onmouseover="changeImage('etoile-dessin.png')"
onmouseout="resetImage()"
onclick="location.href='dessin.html'">
</div>

</div>

<script>

function changeImage(image){
    document.getElementById("etoile").src = image;
}

function resetImage(){
    document.getElementById("etoile").src = "etoile.png";
}

</script>

</body>

</html>
