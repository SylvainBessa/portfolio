<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Portfolio</title>

<style>

body{
    background:white;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

svg{
    width:500px;
}

.branche{
    fill:black;
    cursor:pointer;
    transition:0.2s;
}

.branche:hover{
    fill:red;
}

#label{
    position:absolute;
    font-size:32px;
    pointer-events:none;
}

</style>

</head>

<body>

<div id="label"></div>

<svg viewBox="0 0 500 500">

<polygon class="branche"
points="250,50 280,180 220,180"
onmouseover="showLabel('Dessins')"
onclick="location.href='dessins.html'"/>

<polygon class="branche"
points="450,180 320,220 320,160"
onmouseover="showLabel('Éditions')"
onclick="location.href='editions.html'"/>

<polygon class="branche"
points="380,450 270,300 320,270"
onmouseover="showLabel('Recherche')"
onclick="location.href='recherche.html'"/>

<polygon class="branche"
points="120,450 180,270 230,300"
onmouseover="showLabel('Projets')"
onclick="location.href='projets.html'"/>

<polygon class="branche"
points="50,180 180,160 180,220"
onmouseover="showLabel('Archives')"
onclick="location.href='archives.html'"/>

<circle cx="250" cy="250" r="40" fill="black"/>

</svg>

<script>

function showLabel(text){
document.getElementById("label").innerHTML=text;
}

</script>

</body>

</html>
