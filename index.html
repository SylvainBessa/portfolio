<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Portfolio</title>

<link rel="preload" href="etoile-portfolio.webp" as="image">
<link rel="preload" href="etoile-cv.webp" as="image">
<link rel="preload" href="etoile-volume.webp" as="image">
<link rel="preload" href="etoile-zine.webp" as="image">
<link rel="preload" href="etoile-dessin.webp" as="image">

<style>
body{
    margin:0;
    background:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

#nuage{
    position:absolute;
    top:20px;
    left:-300px;
    width:260px;
    animation: promenade 30s linear infinite;
    z-index:10;
}

#nom{
    position:absolute;
    top:85px;
    left:-300px;
    width:260px;
    text-align:center;
    font-family:"Times New Roman", serif;
    font-size:28px;
    color:black;
    animation: promenade 30s linear infinite;
    z-index:11;
    pointer-events:none;
}

@keyframes promenade{
    from{
        transform:translateX(-300px);
    }
    to{
        transform:translateX(calc(100vw + 600px));
    }
}

#container{
    position:relative;
    width:1000px;
}

#etoile{
    width:100%;
    display:block;
}

.zone{
    position:absolute;
    cursor:pointer;
}

#portfolio{
    top:260px;
    left:240px;
    width:180px;
    height:160px;
}

#cv{
    top:120px;
    left:435px;
    width:130px;
    height:220px;
}

#volume{
    top:260px;
    right:240px;
    width:180px;
    height:160px;
}

#zine{
    bottom:230px;
    left:320px;
    width:160px;
    height:170px;
}

#dessin{
    bottom:230px;
    right:320px;
    width:160px;
    height:170px;
}
</style>
</head>

<body>

<img id="nuage" src="nuage.webp" alt="">
<div id="nom">Sylvain Bessa</div>

<div id="container">

<img id="etoile" src="etoile.webp" alt="">

<div class="zone" id="portfolio"
onmouseover="changeImage('etoile-portfolio.webp')"
onmouseout="resetImage()"
onclick="location.href='portfolio.html'"></div>

<div class="zone" id="cv"
onmouseover="changeImage('etoile-cv.webp')"
onmouseout="resetImage()"
onclick="location.href='cv.html'"></div>

<div class="zone" id="volume"
onmouseover="changeImage('etoile-volume.webp')"
onmouseout="resetImage()"
onclick="location.href='volume.html'"></div>

<div class="zone" id="zine"
onmouseover="changeImage('etoile-zine.webp')"
onmouseout="resetImage()"
onclick="location.href='zine.html'"></div>

<div class="zone" id="dessin"
onmouseover="changeImage('etoile-dessin.webp')"
onmouseout="resetImage()"
onclick="location.href='dessin.html'"></div>

</div>

<script>
const images = [
    "etoile-portfolio.webp",
    "etoile-cv.webp",
    "etoile-volume.webp",
    "etoile-zine.webp",
    "etoile-dessin.webp"
];

images.forEach(src => {
    const img = new Image();
    img.src = src;
});

function changeImage(image){
    document.getElementById("etoile").src = image;
}

function resetImage(){
    document.getElementById("etoile").src = "etoile.webp";
}
</script>

</body>
</html>
