<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Portfolio</title>

<style>

body{
    margin:0;
    background:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#container{
    position:relative;
    width:1000px;
}

#etoile{
    width:100%;
    display:block;
}

.zone{
    position:absolute;
    cursor:pointer;

    /* POUR AJUSTER LES ZONES :
    border:2px solid red;
    */
}

/* PORTFOLIO - branche haut gauche */
#portfolio{
    top:260px;
    left:240px;
    width:180px;
    height:160px;
}

/* CV - branche du haut */
#cv{
    top:120px;
    left:435px;
    width:130px;
    height:220px;
}

/* VOLUME - branche haut droite */
#volume{
    top:260px;
    right:240px;
    width:180px;
    height:160px;
}

/* ZINE - branche bas gauche */
#zine{
    bottom:230px;
    left:320px;
    width:160px;
    height:170px;
}

/* DESSIN - branche bas droite */
#dessin{
    bottom:230px;
    right:320px;
    width:160px;
    height:170px;
}

</style>

</head>

<body>

<div id="container">

<img id="etoile" src="etoile.webp" alt="étoile">

<div class="zone" id="portfolio"
onmouseover="changeImage('etoile-portfolio.webp')"
onmouseout="resetImage()"
onclick="location.href='portfolio.html'">
</div>

<div class="zone" id="cv"
onmouseover="changeImage('etoile-cv.webp')"
onmouseout="resetImage()"
onclick="location.href='cv.html'">
</div>

<div class="zone" id="volume"
onmouseover="changeImage('etoile-volume.webp')"
onmouseout="resetImage()"
onclick="location.href='volume.html'">
</div>

<div class="zone" id="zine"
onmouseover="changeImage('etoile-zine.webp')"
onmouseout="resetImage()"
onclick="location.href='zine.html'">
</div>

<div class="zone" id="dessin"
onmouseover="changeImage('etoile-dessin.webp')"
onmouseout="resetImage()"
onclick="location.href='dessin.html'">
</div>

</div>

<script>

function changeImage(image){
    document.getElementById("etoile").src = image;
}

function resetImage(){
    document.getElementById("etoile").src = "etoile.webp";
}

</script>

</body>
</html>
